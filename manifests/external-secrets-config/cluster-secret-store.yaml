# Cluster-scoped binding from ESO to the in-cluster Vault. Cluster-scoped (a
# ClusterSecretStore, not a namespaced SecretStore) so an ExternalSecret in ANY
# namespace can reference it by name. Depends on the one-time Vault bootstrap
# (KV v2 at secret/, kubernetes auth, policy eso-read, role `eso` bound to the
# external-secrets SA) — see memory/vault-bootstrap. Reports NotReady until that
# bootstrap is in place and Vault is unsealed/reachable.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-kv
spec:
  provider:
    vault:
      # In-cluster Service; plaintext HTTP (standalone chart default is
      # tls_disable). Acceptable on the cluster network for now — revisit with
      # in-cluster TLS + caProvider later.
      server: "http://vault.vault.svc:8200"
      path: "secret"        # KV v2 mount; ESO handles the secret/data/ indirection
      version: "v2"
      auth:
        # ESO mints a token for the SA below and logs into Vault's kubernetes
        # auth as role `eso` (no static token = no secret-zero in git).
        kubernetes:
          mountPath: "kubernetes"   # where `vault auth enable kubernetes` mounted
          role: "eso"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
