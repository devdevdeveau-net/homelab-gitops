apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-loadtest
  namespace: loadtest
data:
  test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      vus: 10,
      duration: '30s',
      thresholds: {
        http_req_failed: ['rate<0.01'],   // <1% errors
        http_req_duration: ['p(95)<500'], // 95% under 500ms
      },
    };

    export default function () {
      // In-cluster Service DNS — no external resolution, no TLS, no ingress.
      // Tests the pod directly. Swap to https://hello.REPLACE_ME_WITH_DOMAIN to
      // exercise the Traefik + cert path (resolves in-pod via CoreDNS→pihole).
      const res = http.get('http://hello.hello.svc.cluster.local');
      check(res, { 'status is 200': (r) => r.status === 200 });
      sleep(1);
    }
---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: hello-loadtest
  namespace: loadtest
spec:
  # Split the VUs across 2 runner pods so you can see the operator fan out in
  # the Argo resource tree. Bump for heavier tests.
  parallelism: 2
  script:
    configMap:
      name: hello-loadtest
      file: test.js
  # Stream results into pi-infra's Prometheus (your existing remote-write
  # receiver) so k6_http_req_* land in the same Grafana as everything else.
  # Argo only shows that the run happened; the actual metrics live over there.
  arguments: --out experimental-prometheus-rw
  runner:
    env:
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: "http://REPLACE_ME_WITH_METRICS_HOST:9090/api/v1/write"
      - name: K6_PROMETHEUS_RW_TREND_STATS
        value: "p(95),p(99),min,max,avg"
