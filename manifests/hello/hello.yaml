apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: hello
spec:
  # 3 replicas so chaos degrades gracefully: pod-kill (mode: one) drops 1 of 3
  # and k6 sees a dip, not a full outage. No PVC on this app, so no RWO conflict.
  replicas: 3
  selector:
    matchLabels: { app: hello }
  template:
    metadata:
      labels: { app: hello }
    spec:
      containers:
        - name: hello
          # Built from ./hello-build and pushed to the pi registry. See that
          # dir's README for the build+push one-liner. No imagePullSecret: the
          # registry has no auth and serves a real LE cert, so k3s containerd
          # pulls it natively (no registries.yaml insecure entry needed).
          image: REPLACE_ME_WITH_REGISTRY/hello:1.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hello
  namespace: hello
spec:
  selector: { app: hello }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hello-cert
  namespace: hello
spec:
  secretName: hello-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - hello.REPLACE_ME_WITH_DOMAIN
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hello
  namespace: hello
spec:
  entryPoints: [ websecure ]
  routes:
    - match: Host(`hello.REPLACE_ME_WITH_DOMAIN`)
      kind: Rule
      services:
        - name: hello
          port: 80
  tls:
    secretName: hello-tls
