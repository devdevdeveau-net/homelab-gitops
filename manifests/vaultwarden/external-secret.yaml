# First migration / end-to-end ESO test. Reads the admin token from Vault KV and
# projects it into the SAME `vaultwarden-admin` Secret the Deployment already
# consumes via secretKeyRef. creationPolicy: Merge means ESO updates the key in
# the existing hand-made Secret but does NOT take ownership or set
# ownerReferences — so the pre-existing Secret stays load-bearing and a prune
# can't delete it. Switch to Owner later once the Vault path is trusted.
#
# Prereq: the value must already be in Vault, e.g.
#   ADMIN=$(kubectl -n vaultwarden get secret vaultwarden-admin -o jsonpath='{.data.admin-token}' | base64 -d)
#   kubectl -n vault exec -i vault-0 -- vault kv put secret/vaultwarden/admin admin-token="$ADMIN"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vaultwarden-admin
  namespace: vaultwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: ClusterSecretStore
  target:
    name: vaultwarden-admin
    creationPolicy: Merge
  data:
    - secretKey: admin-token
      remoteRef:
        # Path under the KV v2 mount (no `secret/` prefix, no `data/` segment —
        # ESO adds those). We stored it at secret/vaultwarden/admin.
        key: vaultwarden/admin
        property: admin-token
