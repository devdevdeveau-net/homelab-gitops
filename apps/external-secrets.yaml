apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Wave 0: installs the ESO CRDs (ClusterSecretStore, ExternalSecret) that the
    # external-secrets-config app (wave 1) and workload ExternalSecrets depend on.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    # Public HTTPS Helm repo. ESO is the sync layer, not the store: it reads
    # from Vault and projects native k8s Secrets, ordered by Argo sync-waves so
    # they land before the workloads that secretKeyRef them.
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0   # app v2.7.0
    helm:
      values: |
        installCRDs: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # ServerSideApply for the bundled CRDs, same rationale as the ARC controller
    # app: avoids the client-side last-applied-configuration annotation limit.
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
