apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k6-operator
  namespace: argocd
  annotations:
    # Wave 0: the operator + its TestRun CRD must exist before the loadtest
    # app (wave 1) creates a TestRun. Same ordering reason as arc-controller.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: ghcr.io/grafana/helm-charts
    chart: k6-operator
    # Pin it. https://github.com/grafana/k6-operator/releases
    targetRevision: 3.14.0
  destination:
    server: https://kubernetes.default.svc
    namespace: k6-operator-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # ServerSideApply for the same reason as ARC: the TestRun CRD overflows the
    # 262144-byte last-applied-configuration annotation under client-side apply.
    syncOptions: [ CreateNamespace=true, ServerSideApply=true ]
