apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    # Wave 1: the ClusterSecretStore CRD is installed by the external-secrets
    # app (wave 0), so this must reconcile after it.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: git@github.com:REPLACE_ME_WITH_GITHUB_ORG/homelab-gitops.git
    targetRevision: main
    path: manifests/external-secrets-config
  destination:
    server: https://kubernetes.default.svc
    # Ignored for the cluster-scoped ClusterSecretStore, but Argo wants a value.
    namespace: external-secrets
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
