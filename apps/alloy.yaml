apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    # Wave 1: depends on wave 0 (scrape targets + pi-endpoints ConfigMap).
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    # Public HTTPS Helm repo (not OCI), so unlike the ARC registry it needs no
    # bootstrap/*-repo.yaml registration. The chart ships only a DaemonSet + RBAC
    # + ConfigMap (no CRDs), so no ServerSideApply needed — the annotation-limit
    # that forced SSA on ARC's CRDs doesn't apply here.
    repoURL: https://grafana.github.io/helm-charts
    chart: alloy
    targetRevision: 1.10.0   # app v1.17.0
    helm:
      values: |
        controller:
          type: daemonset
        alloy:
          # Pi endpoints come from the wave-0 ConfigMap; config.alloy reads them
          # via sys.env(). Re-IP the Pi by editing pi-endpoints.yaml only.
          envFrom:
            - configMapRef:
                name: pi-endpoints
          configMap:
            create: true
            content: |-
              // ========================================================
              // LOGS — every pod's stdout/stderr -> Pi Loki
              // ========================================================
              discovery.kubernetes "pods" {
                role = "pod"
              }

              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets

                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app"]
                  target_label  = "app"
                }
              }

              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pod_logs.output
                forward_to = [loki.write.pi.receiver]
              }

              loki.write "pi" {
                endpoint {
                  url = sys.env("LOKI_URL")
                }
                external_labels = {
                  cluster = "k3s",
                }
              }

              // ========================================================
              // METRICS — node-exporter, kube-state-metrics, cAdvisor
              //           -> Pi Prometheus (remote_write)
              // ========================================================

              // node-exporter DaemonSet (host metrics)
              discovery.kubernetes "node_exporter" {
                role = "pod"
                namespaces {
                  names = ["monitoring"]
                }
                selectors {
                  role  = "pod"
                  label = "app.kubernetes.io/name=node-exporter"
                }
              }

              prometheus.scrape "node_exporter" {
                targets    = discovery.kubernetes.node_exporter.targets
                forward_to = [prometheus.remote_write.pi.receiver]
                job_name   = "node-exporter"
              }

              // kube-state-metrics (cluster object state); keep only the :8080
              // metrics port, skip the :8081 self-telemetry port.
              discovery.kubernetes "ksm" {
                role = "service"
                namespaces {
                  names = ["monitoring"]
                }
                selectors {
                  role  = "service"
                  label = "app.kubernetes.io/name=kube-state-metrics"
                }
              }

              discovery.relabel "ksm" {
                targets = discovery.kubernetes.ksm.targets
                rule {
                  source_labels = ["__meta_kubernetes_service_port_name"]
                  regex         = "metrics"
                  action        = "keep"
                }
              }

              prometheus.scrape "ksm" {
                targets    = discovery.relabel.ksm.output
                forward_to = [prometheus.remote_write.pi.receiver]
                job_name   = "kube-state-metrics"
              }

              // cAdvisor via the kubelet — per-pod CPU/mem for every workload
              // (memos, vaultwarden, ...) for free. Scraped straight off the
              // kubelet at :10250; authorized by the SA's nodes/metrics grant
              // (in the chart's default ClusterRole), so no extra RBAC.
              discovery.kubernetes "nodes" {
                role = "node"
              }

              discovery.relabel "cadvisor" {
                targets = discovery.kubernetes.nodes.targets

                rule {
                  source_labels = ["__meta_kubernetes_node_address_InternalIP"]
                  regex         = "(.+)"
                  replacement   = "${1}:10250"
                  target_label  = "__address__"
                }
                rule {
                  target_label = "__metrics_path__"
                  replacement  = "/metrics/cadvisor"
                }
              }

              prometheus.scrape "cadvisor" {
                targets           = discovery.relabel.cadvisor.output
                forward_to        = [prometheus.remote_write.pi.receiver]
                job_name          = "cadvisor"
                scheme            = "https"
                bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                tls_config {
                  ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  insecure_skip_verify = true
                }
              }

              prometheus.remote_write "pi" {
                endpoint {
                  url = sys.env("PROMETHEUS_URL")
                }
                external_labels = {
                  cluster = "k3s",
                }
              }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
